name: Deploy to Bluehost

# Deploys both the WordPress theme AND the admin portal to Bluehost over FTP
# whenever you push to the main branch.
#
# ONE-TIME SETUP — add these repository secrets:
#   Settings → Secrets and variables → Actions → New repository secret
#
#   FTP_SERVER    ftp.7elementstore.com
#   FTP_USERNAME  deploy@enternstech.com
#   FTP_PASSWORD  the password you set when creating the FTP account in Bluehost

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allows manual trigger from the GitHub Actions tab

jobs:
  deploy-theme:
    name: Deploy WordPress Theme
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload theme via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir:  ./enternstech/
          server-dir: /home3/seveleme/public_html/enternstech/wp-content/themes/enternstech/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/.github/**

  deploy-admin-portal:
    name: Deploy Admin Portal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload admin portal via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir:  ./admin-portal/
          server-dir: /home3/seveleme/public_html/enternstech/admin-portal/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            config.php
