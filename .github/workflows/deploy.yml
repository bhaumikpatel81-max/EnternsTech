name: Deploy to Hostinger

# Deploys both the WordPress theme AND the admin portal to Hostinger over FTP
# whenever you push to the main branch.
#
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP — add these three repository secrets:
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#
#   Secret name      Where to find the value in Hostinger
#   ───────────────  ──────────────────────────────────────────────────────────
#   FTP_SERVER       hPanel → Hosting → Manage → FTP Accounts
#                    "FTP server" field — looks like: ftp.enternstech.com
#                    (or the server IP shown in hPanel → Details / Server info)
#
#   FTP_USERNAME     hPanel → Hosting → Manage → FTP Accounts
#                    The username of the FTP account you created, e.g.:
#                    u123456789.enternstech   (Hostinger format)
#
#   FTP_PASSWORD     The password you set when creating that FTP account.
#
# ─────────────────────────────────────────────────────────────────────────────
# HOSTINGER PATH NOTE:
#   The server-dir below assumes WordPress is installed at the root of your
#   domain (public_html/).  If Hostinger shows a different base path in their
#   File Manager, adjust accordingly.
#
#   Hostinger FTP root = /  which maps to your home directory.
#   public_html/ is usually the web root for your primary domain.
#
#   Theme folder name "enternstech" must match the folder WordPress has
#   activated under Appearance → Themes.  If the folder on the server is
#   currently named something else, either rename it in File Manager first
#   or update server-dir here to match.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allows manual trigger from the GitHub Actions tab

jobs:
  deploy-theme:
    name: Deploy WordPress Theme
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload theme via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir:  ./enternstech/
          server-dir: /public_html/wp-content/themes/enternstech/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/.github/**

  deploy-admin-portal:
    name: Deploy Admin Portal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload admin portal via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir:  ./admin-portal/
          server-dir: /public_html/admin-portal/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            config.php
