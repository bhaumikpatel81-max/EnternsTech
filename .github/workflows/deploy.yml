name: Validate WordPress Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Lint PHP files
        run: |
          find admin-portal wp-content -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run psychometric scorer tests
        run: php wp-content/plugins/enterns-portal/tests/psy-scorer-test.php

  package-artifacts:
    name: Package theme + plugin zips
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Create theme zip
        run: |
          cd wp-content/themes
          zip -r "${{ github.workspace }}/theme-enternstech.zip" enternstech

      - name: Create plugin zip
        run: |
          cd wp-content/plugins
          zip -r "${{ github.workspace }}/plugin-enterns-portal.zip" enterns-portal

      - name: Upload theme artifact
        uses: actions/upload-artifact@v4
        with:
          name: enternstech-theme
          path: theme-enternstech.zip

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterns-portal-plugin
          path: plugin-enterns-portal.zip
